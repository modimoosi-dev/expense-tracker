services:
  - type: web
    name: expense-tracker
    runtime: php
    plan: free
    buildCommand: "composer install --no-dev --optimize-autoloader && npm ci && npm run build && php artisan config:cache && php artisan route:cache && php artisan view:cache"
    startCommand: "php artisan migrate --force && php artisan storage:link --force && php artisan serve --host=0.0.0.0 --port=$PORT"
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://expense-tracker.onrender.com
      - key: ASSET_URL
        value: https://expense-tracker.onrender.com
      - key: DB_CONNECTION
        value: mysql
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database

databases:
  - name: expense-tracker-db
    databaseName: expense_tracker
    plan: free
